
<HTML>

    <head>

        <meta charset = "UTF-8">
        <title>Game XO</title>

        <style>

            body{
                background-color: rgb(24, 23, 21);

            }


            label{
                color: white;
            }

            input{

            

                 border: 1px solid black;
                border-radius: 5px;

                padding: 0.4rem;
                
                font-size: 1rem;
                font-family: 'Times New Roman', Times, serif;
                font-weight: bold;
            }

            label, input{
                margin-left: 1.5rem;
            }

            input:hover{

                background-color: blue;
                color: white;

                transform: translateY(-5px);
                transition: all 0.4s;
               
            }
          


            .board{

                display: flex;
                
                flex-wrap : wrap;
                align-items: center;;
                justify-content: center;

                
                
                background-color: silver;

                width: 23rem;
                height : 25rem;
                margin : 3rem auto;


            }

           .board{
            border: 3px solid black;
            border-radius: 5px;

           }

            

            .cell{
              

                width: 5rem;
                height: 5rem;

                margin : 1rem;
                padding-top: 1.1rem;

                text-align: center;

                background-color:blue;

                font-size: 3.3rem;

                
                border-radius: 0.3rem;



            }

            .cell:hover{
                transform: translateY(-5px);
                transition: all 0.4s;
            }

            #status{
                text-align: center;

                font-size: 3rem;
                font-family: Georgia, 'Times New Roman', Times, serif;
                font-weight: bold;

                background-color:silver ;

                border: 0.1rem solid black;
                border-radius:0.3rem ;

                width: 40rem;

                margin: 0 auto;
                padding: 0.6rem;

            }

            .space{

                background-color:lightslategrey;

                width: 70rem;

                margin: 0 auto;
                padding: 2rem;

                border: 0px solid;
                border-radius: 10px;

                margin-bottom: 8rem;

                overflow-x: auto;
            }

            


            button{


                display: block;

                background-color:blue;
                color: black;

                font-size: 1rem;
                font-family: 'Times New Roman', Times, serif;
                font-weight: bold;
                
                margin: 2rem;
               padding: 0.5rem;
                margin-top: 8rem;


            }

            button:hover{
                background-color: white;

                transform: translateY(-5px);
                transition: all 0.4s;
                
            }



            table{

                width : 45rem;
                
                margin: 0 auto;

                border-collapse: collapse;

                overflow-x:auto;


            }

        tr{

             text-align: center;
            color: white;

        }

        th{

             background-color:lightskyblue;

        }


            th,td{

            padding: 1rem;

              border: none;

              border-bottom: 0.1rem solid white;

              font-family: 'Times New Roman', Times, serif;
              font-size: 1.1rem;
              font-weight: bold;

              
            }



        </style>


</head>




        <body>

            <br>
            <br>
            <br>
            <br>
            <br>

            <div ckass = "textt">

            <label for = "tex">Enter Name Player X : </label>
            <input type = "text" id = "tex" name = "tex" placeholder = "Enter Your Name" >
            <br>
            <br>

            <label for = "tex2">Enter Name Player O : </label>
            <input type = "text" id = "tex2" name = "tex2" placeholder = "Enter Your Name">

            </div>

            <br>
            <br>
            <br>
            <br>
            
<div class = "space">

            <h1 id = "status">Player X</h1><br>

        <div class = "board">

            <div class = "cell"></div>
            <div class = "cell"></div>
            <div class = "cell"></div>
            <div class = "cell"></div>
            <div class = "cell"></div>
            <div class = "cell"></div>
            <div class = "cell"></div>
            <div class = "cell"></div>
            <div class = "cell"></div>

        </div>

        </div>


        <div class = "table-score">

            <table >

                <tr>

                    <th>Player</hr>
                        <th>Winner</th>

                    </tr>

                    <tr>

                        <td id = "namex">Player X</td>

                        <td id = "score X">0</td>

                        </tr>

                    <tr>

                        <td id = "nameo">Player O</td>

                        <td id = "score O">0</td>

                    </tr>

            </table>

        </div>


        <button onclick = "resert()">Resert Player</button>

        

        <script>
            

            let currentplayer = "X";
            let lock = 1;

            let cell = document.querySelectorAll(".cell");

            let status = document.getElementById("status");

            let winplayer = [

                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 4, 7],
                [2, 4, 6],
                [0, 3, 6],
                [1, 4, 7],
                [2 ,5, 8]

        ];

        let scorex = 0;
        let scoreo = 0;

       let scorexele = document.getElementById("score X"); //display place
       let scoreoele = document.getElementById("score O"); // display place

       let inputx = document.getElementById("tex");
       let inputo = document.getElementById("tex2");

       let namexele = document.getElementById("namex");
       let nameoele = document.getElementById("nameo");

       let namex = "";
       let nameo = "";


        
           for (let i = 0; i<cell.length; i++){

                cell[i].onclick = function () {

                    if (cell[i].innerHTML === "" && lock === 1) {

    

                         namexele.innerHTML =  inputx.value || "palyer X";
                         nameoele.innerHTML = inputo.value || "palyer O";

                       
                        cell[i].innerHTML = currentplayer;

                        if (currentplayer === "X"){
                            currentplayer = "O";
                        }
                        else{
                            currentplayer = "X";
                        }

                        status.innerHTML = "Player " + currentplayer;
                     
                        checkwin();

                    }

                      
                    
                };

            }

            
             
             function checkwin() {

                let playerx = document.getElementById("tex").value;
                let playero = document.getElementById("tex2").value;

        
                
                for (let i=0; i<winplayer.length; i++){

                    let a = winplayer[i][0];
                    let b = winplayer[i][1];
                    let c = winplayer[i][2];

                    if (cell[a].innerHTML === cell[b].innerHTML && cell[b].innerHTML === cell[c].innerHTML && cell[a].innerHTML !== "" ) {

                        if (currentplayer !== "X"){
                            scorex++;
                            scorexele.innerHTML = scorex;
                            status.innerHTML = " Player X (" + playerx + ") 🎉 Win ";
                            
                            
                        }
                        else {
                            scoreo++;
                            scoreoele.innerHTML = scoreo;
                            status.innerHTML = " Player O ( "+ playero +") 🎉 Win ";
                        }
                        lock = 0;
                    

                     

                    }

                }

                
             }





             function resert() {

               for(let i=0; i<cell.length; i++) {

                    cell[i].innerHTML = "";
                };

                currentplayer = "";

                status.innerHTML = "Player X";

                lock = 1;

            }

            


        </script>


        </body>


</html>
